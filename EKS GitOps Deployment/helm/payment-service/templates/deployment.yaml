apiVersion: apps/v1
kind: Deployment

metadata:
  name: payment-service

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: payment-service

  template:
    metadata:
      labels:
        app: payment-service

    spec:
      serviceAccountName: payment-service-sa

      containers:
        - name: payment-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: payment-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-secret
                  key: DB_PASSWORD

          resources:
{{ toYaml .Values.resources | nindent 12 }}

          ports:
            - containerPort: 5000