name: Python CI/CD Pipeline

on:
  push:
    branches:
      - main

  schedule:
    - cron: '30 10 * * *'

  workflow_dispatch:

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest -v

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Build Package
        run: |
          mkdir build
          cp calculator.py build/
          cp requirements.txt build/
          cp test_calculator.py build/
          zip -r calculator-build.zip build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-build
          path: calculator-build.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Simulated Deployment
        run: |
          echo "=================================="
          echo "DEPLOYMENT STARTED"
          echo "Scientific Calculator Application"
          echo "Deploying Build Artifact..."
          echo "Deployment Successful"
          echo "=================================="

      - name: Create Deployment Report
        run: |
          echo "Deployment completed successfully" > deployment-report.txt

      - name: Upload Deployment Report
        uses: actions/upload-artifact@v4
        with:
          name: deployment-report
          path: deployment-report.txt