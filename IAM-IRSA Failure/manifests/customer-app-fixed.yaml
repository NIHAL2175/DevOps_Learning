apiVersion: v1
kind: ServiceAccount
metadata:
  name: customer-app-sa
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/customer-app-irsa-role
---
apiVersion: v1
kind: Pod
metadata:
  name: customer-app
spec:
  serviceAccountName: customer-app-sa
  containers:
  - name: customer-app
    image: busybox
    command:
      - sh
      - -c
      - |
        echo "Assuming IAM role via IRSA..."
        echo "Successfully authenticated"
        echo "DynamoDB GetItem succeeded"
        sleep 3600