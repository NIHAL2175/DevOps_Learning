replicaCount: 2

image:
  repository: nginx
  tag: "latest"
  pullPolicy: IfNotPresent

configMap:
  enabled: true
  data:
    APP_NAME: "reusable-app"
    APP_ENV: "qa"

secret:
  enabled: true
  data:
    USERNAME: "qa-user"
    PASSWORD: "qa-password"

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

ingress:
  enabled: false

autoscaling:
  enabled: false