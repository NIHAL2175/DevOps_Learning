replicaCount: 1

image:
  repository: nginx
  tag: "latest"
  pullPolicy: IfNotPresent

configMap:
  enabled: true
  data:
    APP_NAME: "reusable-app"
    APP_ENV: "dev"

secret:
  enabled: true
  data:
    USERNAME: "dev-user"
    PASSWORD: "dev-password"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

ingress:
  enabled: false

autoscaling:
  enabled: false