apiVersion: v1
kind: Pod
metadata:
  name: payment-service
  labels:
    app: payment-service
spec:
  containers:
  - name: payment-service
    image: busybox
    command:
    - sh
    - -c
    - |
      echo "Starting payment-service..."
      echo "Loading updated Kubernetes Secret..."
      echo "Connecting to Redis..."
      echo "Redis authentication successful"
      echo "Application started successfully"
      sleep 3600